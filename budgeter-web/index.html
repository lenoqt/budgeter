<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>家族予算 Family Budget</title>

    <!-- Source Code Pro — strictly monospace on all platforms -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap"
    />

    <style>
      /* ── Reset ── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #0f1420;
        color: #c8d0e0;
        font-family: "Source Code Pro", "Cascadia Code", "Fira Code",
                     "Consolas", "Menlo", "DejaVu Sans Mono", monospace;
        font-size: 14px;
        line-height: 1.2;
        overflow: hidden;
      }

      /* ── App shell ── */
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── webatui injects <pre> blocks; keep them full-width ── */
      pre {
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        white-space: pre;
        flex: 1 1 auto;
        overflow: auto;
      }

      /* ── Cursor / pointer on clickable spans ── */
      span[data-on-click] {
        cursor: pointer;
      }
      span[data-on-click]:hover {
        text-decoration: underline;
        opacity: 0.85;
      }

      /* ── Loading placeholder shown before WASM boots ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1420;
        color: #3cb8e6;
        font-size: 1.1em;
        letter-spacing: 0.05em;
      }
    </style>
  </head>

  <body>
    <div id="loading">Loading 家族予算…</div>
    <div id="app"></div>

    <!-- trunk replaces this with the compiled WASM+JS bundle -->
    <link data-trunk rel="rust" data-bin="budgeter-web" />
  </body>
</html>
